site_name: Detroit Roleplay
site_url: https://regulamento.detroitroleplay.com
docs_dir: docs

theme:
  name: material
  language: pt
  palette:
    - scheme: slate
      primary: red
      accent: red
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang: pt
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
